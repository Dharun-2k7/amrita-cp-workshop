{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-up delay-1">
    <div class="card">
        <span class="section-eyebrow" style="text-align: center; display: block;">Member Access</span>
        <h2 class="auth-title text-gradient">Welcome Back</h2>
        <p class="auth-sub">Sign in to continue your weekly challenge streak.</p>

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" placeholder="you@university.edu"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Sign In</button>
        </form>

        <p class="auth-footer">
            New here? <a href="{{ url_for('main.register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
