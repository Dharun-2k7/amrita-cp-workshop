{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-up delay-1">
    <div class="card">
        <span class="section-eyebrow" style="text-align: center; display: block;">Student Access</span>
        <h2 class="auth-title text-gold" style="font-size: 1.8rem;">Student Login - IOI Vismaya</h2>
        <p class="auth-sub">Use your registered email to access your problem dashboard.</p>

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" placeholder="you@university.edu"
                    required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                    <a href="{{ url_for('main.forgot_password') }}" style="font-size: 0.85rem; color: var(--icpc-gold); text-decoration: none;">Forgot Password?</a>
                </div>
                <input class="form-control" type="password" id="password" name="password" placeholder="••••••••"
                    required>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
                <input type="checkbox" id="remember" name="remember" style="accent-color: var(--icpc-gold); width: 1.2rem; height: 1.2rem; cursor: pointer;">
                <label for="remember" style="margin-bottom: 0; color: var(--text-muted); font-size: 0.95rem; cursor: pointer;">Remember me for 30 days</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Sign In</button>
        </form>

        <p class="auth-footer">
            New here? <a href="{{ url_for('main.register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
