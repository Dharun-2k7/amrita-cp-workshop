{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-up delay-1" style="max-width: 450px;">
    <div class="card">
        <span class="section-eyebrow" style="text-align: center; display: block;">Secure Access</span>
        <h2 class="auth-title text-gradient">Verification</h2>

        <p class="auth-sub">
            We sent a secure 6-digit code to <br><strong style="color: white;">{{ email }}</strong>. 
        </p>

        <form method="POST" action="{{ url_for('main.verify') }}">
            <div class="form-group">
                <label class="form-label" style="text-align: center;" for="otp">Enter your code</label>
                <input class="form-control otp-input" type="text" id="otp" name="otp" placeholder="123456" required autocomplete="off">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Confirm Identity</button>
        </form>
    </div>
</div>
{% endblock %}
